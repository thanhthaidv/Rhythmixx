name: Test Project

on:
  push:
    branches:
      - ThanhThai

  pull_request:
    branches:
      - ThanhThai
  
jobs:
  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Restore packages
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      
      - name: Run tests
        run: dotnet test --configuration Release --no-build

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install packages
        run: npm install

      - name: Build frontend
        run: npm run build
        