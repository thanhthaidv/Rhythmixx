services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rhythmix_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rhythmix_api
    depends_on:
      - sqlserver
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Override connection string from appsettings.json
      - ConnectionStrings__DefaultConnection=Server=rhythmixdb.cwxwqoskaiay.us-east-1.rds.amazonaws.com,1433;Database=RhythmixDb;User Id=admin;Password=root1234;TrustServerCertificate=True;MultipleActiveResultSets=true
volumes:
  sqlserver_data:
